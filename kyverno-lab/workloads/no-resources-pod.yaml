apiVersion: v1
kind: Pod
metadata:
  name: no-resources-pod
  labels:
    app: no-resources
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
  - name: main
    image: nginx:1.21
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false